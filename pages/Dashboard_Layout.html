<script>

/* 4.1.1 - Dashboard State & Security Timer */
window.dashboardConfig = {
  checkInterval: 30000, // Cek validitas sesi tiap 30 detik
  sidebarWidth: "w-72"
};
  
/* 4.1.2 - Dashboard Controller & RBAC Renderer */
window.initializeDashboard = function() {
  const user = window.userData;
  if (!user || !user.sessionID) return window.navigateTo('Login');

  // Inject Profile
  document.getElementById('exec-name').innerText = user.nama;
  document.getElementById('exec-role').innerText = user.role;

  // Render Role-Based Menu
  const menuContainer = document.getElementById('exec-sidebar-nav');
  menuContainer.innerHTML = user.menus.map(m => `
    <button onclick="navigateTo('${m.pageId}')" 
      class="w-full flex items-center gap-4 px-6 py-4 text-[10px] font-black uppercase tracking-[0.2em] border-b border-zinc-900 hover:bg-zinc-900 hover:text-white transition-all group">
      <span class="text-zinc-600 group-hover:text-amber-500">${m.icon || '■'}</span>
      <span>${m.name}</span>
    </button>
  `).join('');

  // Start Session Guardian (Anti-Multi Device)
  startSessionGuardian();
};

async function startSessionGuardian() {
  setInterval(async () => {
    const isValid = await window.smartFetch({
      action: "validateSession",
      username: window.userData.username,
      sessionID: window.userData.sessionID
    });
    
    if (!isValid) {
      Swal.fire({
        title: 'SESSION_EXPIRED',
        text: 'Akun login di perangkat lain atau sesi berakhir.',
        icon: 'warning',
        confirmButtonColor: '#000',
        customClass: { popup: 'rounded-none' }
      }).then(() => handleLogout());
    }
  }, window.dashboardConfig.checkInterval);
}
</script>

<div class="flex h-screen overflow-hidden bg-white selection:bg-zinc-950 selection:text-white">
  
  <!-- SIDEBAR: ULTRA SHARP INDUSTRIAL -->
  <aside class="w-72 bg-zinc-950 text-zinc-400 flex flex-col border-r border-zinc-200">
    <div class="p-10 border-b border-zinc-900">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-2 h-8 bg-amber-500"></div>
        <h2 class="text-2xl font-black tracking-tighter text-white uppercase italic">WMS<span class="text-zinc-600 font-light">PRO</span></h2>
      </div>
      <p class="text-[9px] font-mono text-zinc-700 uppercase tracking-[0.4em]">Node Cluster: AHI-V3</p>
    </div>

    <nav id="exec-sidebar-nav" class="flex-1 overflow-y-auto scrollbar-hide">
      <!-- Grouped Menus Injected Here -->
    </nav>

    <div class="p-8 border-t border-zinc-900 bg-black flex items-center justify-between">
      <div class="flex flex-col gap-1">
        <span id="exec-name" class="text-[11px] font-black text-white uppercase tracking-wider italic leading-none">---</span>
        <span id="exec-role" class="text-[9px] font-bold text-zinc-600 uppercase tracking-tighter">---</span>
      </div>
      <button onclick="handleLogout()" class="w-10 h-10 flex items-center justify-center bg-zinc-900 text-zinc-500 hover:text-white transition-all">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </aside>

  <!-- MAIN VIEWPORT -->
  <main class="flex-1 flex flex-col">
    <header class="h-20 bg-white border-b border-zinc-100 flex items-center justify-between px-12">
      <div class="flex items-center gap-8">
        <div class="flex flex-col">
          <span class="text-[9px] font-black text-zinc-300 uppercase tracking-[0.5em] mb-1">Current Sector</span>
          <h3 id="current-page-title" class="text-xs font-black uppercase tracking-[0.2em] text-zinc-950">System Monitoring</h3>
        </div>
      </div>
      
      <div class="flex items-center gap-8">
        <div class="h-10 w-[1px] bg-zinc-100"></div>
        <div class="flex flex-col items-end">
          <span class="text-[9px] font-mono text-zinc-300 uppercase">Status: 200 OK</span>
          <div class="flex items-center gap-2">
            <div class="w-1.5 h-1.5 bg-emerald-500"></div>
            <span class="text-[9px] font-black text-zinc-950 uppercase">Live_Node_Primary</span>
          </div>
        </div>
      </div>
    </header>

    <!-- CONTENT FRAME -->
    <div id="content-area" class="flex-1 overflow-y-auto bg-[#fcfcfc] p-16">
