

<div class="flex h-screen overflow-hidden bg-white selection:bg-zinc-950 selection:text-white flex-col md:flex-row">
  
  <!-- 1. MOBILE TOP BAR (Only visible < md) -->
  <header class="md:hidden h-16 bg-zinc-950 text-white flex items-center justify-between px-6 z-[60] border-b border-zinc-800">
    <div class="flex items-center gap-3">
      <div class="w-1 h-6 bg-amber-500"></div>
      <h2 class="text-lg font-black tracking-tighter uppercase italic">WMS<span class="text-zinc-500 font-light">PRO</span></h2>
    </div>
    <button onclick="window.toggleMobileSidebar()" class="p-2 hover:bg-zinc-900 transition-colors">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>
  </header>

  <!-- 2. MOBILE OVERLAY -->
  <div id="sidebar-overlay" onclick="window.toggleMobileSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden backdrop-blur-sm"></div>

  <!-- 3. SIDEBAR (Sharp Drawer) -->
  <aside id="main-sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-zinc-950 text-zinc-400 flex flex-col border-r border-zinc-200 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">
    <div class="p-10 border-b border-zinc-900 hidden md:block">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-2 h-8 bg-amber-500"></div>
        <h2 class="text-2xl font-black tracking-tighter text-white uppercase italic">WMS<span class="text-zinc-600 font-light">PRO</span></h2>
      </div>
      <p class="text-[9px] font-mono text-zinc-700 uppercase tracking-[0.4em]">Node: AHI-V3</p>
    </div>

    <!-- Scrollable Menu Area -->
    <nav id="exec-sidebar-nav" class="flex-1 overflow-y-auto scrollbar-hide py-4 md:py-0">
      <!-- Logic Accordion Injected Here -->
    </nav>

    <!-- User Footer -->
    <div class="p-8 border-t border-zinc-900 bg-black flex items-center justify-between">
      <div class="flex flex-col gap-1">
        <span id="exec-name" class="text-[11px] font-black text-white uppercase tracking-wider italic">---</span>
        <span id="exec-role" class="text-[9px] font-bold text-zinc-600 uppercase tracking-tighter">---</span>
      </div>
      <button onclick="handleLogout()" class="w-10 h-10 flex items-center justify-center bg-zinc-900 text-zinc-500 hover:text-white">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </aside>

  <!-- 4. MAIN CONTENT AREA -->
  <main class="flex-1 flex flex-col min-w-0">
    <header class="h-20 bg-white border-b border-zinc-100 hidden md:flex items-center justify-between px-12">
      <h3 id="current-page-title" class="text-xs font-black uppercase tracking-[0.5em] text-zinc-950">System Monitoring</h3>
      <span class="text-[9px] font-mono text-zinc-300 uppercase">Live_Node_Primary</span>
    </header>

    <div id="content-area" class="flex-1 overflow-y-auto bg-[#fcfcfc] p-6 md:p-16">
      <!-- Dynamic Pages -->
    </div>
  </main>
</div>

<script>
  
  window.initializeDashboard = function() {
  const user = getSessionUser();
  const nav = document.getElementById('exec-sidebar-nav');
  
  if (!nav || !user) return;

  // Render Profil
  if (document.getElementById('exec-name')) document.getElementById('exec-name').innerText = user.nama;
  if (document.getElementById('exec-role')) document.getElementById('exec-role').innerText = user.role;

  nav.innerHTML = '';
  const standalone = [];
  const folders = {};

  // Pemilahan Menu
  user.menus.forEach(m => {
    if (!m.parent || m.parent === "") {
      if (m.pageId && m.pageId !== "") standalone.push(m);
      else folders[m.name] = { title: m.name, icon: m.icon, children: [] };
    } else {
      if (!folders[m.parent]) folders[m.parent] = { title: m.parent, icon: '📁', children: [] };
      folders[m.parent].children.push(m);
    }
  });

  // Render Tombol Standalone
  standalone.forEach(m => {
    const btn = document.createElement('button');
    btn.className = "w-full flex items-center gap-4 px-8 py-4 text-[10px] font-black text-zinc-400 uppercase tracking-[0.2em] border-b border-zinc-900 text-left hover:bg-zinc-900";
    btn.innerHTML = `<span>${m.icon||'■'}</span><span>${m.name}</span>`;
    btn.onclick = () => window.navigateTo(m.pageId);
    nav.appendChild(btn);
  });

  // Render Folders (Accordion)
  let fIdx = 0;
  for (const key in folders) {
    const f = folders[key];
    if (f.children.length === 0) continue;
    const gid = 'acc-' + fIdx++;
    const div = document.createElement('div');
    div.className = "border-b border-zinc-900";
    div.innerHTML = `
      <button onclick="document.getElementById('${gid}').classList.toggle('hidden'); this.querySelector('svg').classList.toggle('rotate-180')" 
        class="w-full px-8 py-4 flex items-center justify-between bg-zinc-900/40 text-[10px] font-black text-zinc-500 uppercase tracking-[0.3em] group hover:bg-zinc-900 transition-all">
        <div class="flex items-center gap-4"><span>${f.icon||'📁'}</span><span>${f.title}</span></div>
        <svg class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="3"/></svg>
      </button>
      <div id="${gid}" class="hidden flex-col bg-black/40 py-2">
        ${f.children.map(c => `
          <button onclick="window.navigateTo('${c.pageId}')" class="w-full flex items-center gap-4 px-12 py-3.5 text-[10px] font-bold text-zinc-500 uppercase tracking-[0.2em] text-left hover:text-white hover:bg-zinc-900 border-l-2 border-transparent hover:border-amber-500 transition-all">
            <span>${c.icon||'○'}</span><span>${c.name}</span>
          </button>
        `).join('')}
      </div>`;
    nav.appendChild(div);
  }
};
  
</script>
