<div class="flex h-screen overflow-hidden bg-zinc-100 flex-col md:flex-row">
  <!-- Mobile Header (Hanya muncul di HP) -->
  <div class="md:hidden bg-zinc-900 text-white p-4 flex justify-between items-center shadow-lg">
    <div class="font-black tracking-tighter">WMS<span class="text-amber-600">PRO</span></div>
    <button onclick="toggleMobileMenu()" class="p-2 bg-zinc-800 rounded">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>

  <!-- Sidebar (Responsive) -->
  <aside id="main-sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-zinc-900 text-white transform -translate-x-full md:translate-x-0 md:relative transition-transform duration-300 ease-in-out flex flex-col">
    <div class="p-6 hidden md:flex items-center gap-3 border-b border-zinc-800">
        <div class="w-6 h-6 bg-amber-600 rounded"></div>
        <div class="text-lg font-black tracking-tighter uppercase">WMS<span class="text-amber-600">PRO</span></div>
    </div>
    <nav class="flex-1 p-4 space-y-1 overflow-y-auto" id="sidebar-menu">
        <!-- Menu dimuat di sini -->
    </nav>
    <div class="p-4 border-t border-zinc-800 text-[9px] text-zinc-600 font-mono flex justify-between">
        <span>STABLE v3.2</span>
        <button onclick="toggleMobileMenu()" class="md:hidden text-amber-600 font-bold">TUTUP</button>
    </div>
  </aside>

  <!-- Overlay untuk klik di luar sidebar saat mobile -->
  <div id="sidebar-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

  <!-- Content Area -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="h-16 bg-white border-b border-zinc-200 hidden md:flex items-center justify-between px-8">
      <div id="page-title" class="font-bold text-zinc-400 text-[10px] uppercase tracking-[0.3em]">System Dashboard</div>
      <div class="flex items-center gap-6 text-right">
        <div>
          <div class="text-xs font-black text-zinc-900 uppercase" id="user-display-name">...</div>
          <div class="text-[9px] text-amber-600 font-bold uppercase" id="user-role">...</div>
        </div>
        <button onclick="handleLogout()" class="text-zinc-300 hover:text-red-500 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- Halaman di Mobile (User Info Ringkas) -->
    <div class="md:hidden bg-white p-3 border-b flex justify-between items-center px-5">
       <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest" id="mobile-page-title">Dashboard</span>
       <span class="text-[10px] font-black text-amber-600" id="user-display-name-mobile">...</span>
    </div>

    <section id="content-area" class="flex-1 overflow-auto p-4 md:p-8">
        <div class="flex items-center justify-center h-full opacity-20">
            <p class="font-mono text-[10px] uppercase tracking-[1em]">Ready</p>
        </div>
    </section>
  </main>
</div>
